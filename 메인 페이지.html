<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브레인 코드</title>
    <link rel="icon" href="img/뇌-파랑.png" type="image/png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

    <style>
        body{
            margin: 0;
            background-color: #ecf4fd;
        }

        header{
            position: fixed;
            top: 0;
            width: 100%;
        }
        
        p{
            margin: 0;
            font-family: Pretendard, sans-serif;
        }

        h3{
            font-family: Jua, sans-serif;
            font-weight: 500;

            position: relative;

            margin-bottom: 10px;
            font-size: 2rem;
        }

        h1, h2{
            font-family: Jua, sans-serif;
            font-weight: 500;

            position: relative;
            left: 80px;

            margin-bottom: 10px;
            font-size: 3rem;
        }

        .button {
            height: 48px;
            padding: 0 24px;
            font-size: 16px;
            border-radius: 12px;

            background-color: #3B82F6;
            color: white;

            position: relative;
            left: 80px;

            border: none;
        }

        button span {
            display: inline-block;
            transition: transform 0.2s;
        }

        button:hover span {
            transform: translateX(5px);
        }

        .p1{
            position: relative;
            left: 80px;

            margin-top: 0;
            font-size: x-large;
        }

        .p2{
            position: relative;

            margin-top: 0;
            font-size: 20px;
        }

        .arrow {
            margin-left: 8px;
        }
        
        .left{
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;

            background-color: #2F6FD6;
            padding: 15px 30px;
        }

        .brain-logo{
            width: 75px;
            height: 75px;
        }

        .logo {
            color: white;
            font-size: 25px;
            font-weight: bold;

            display: flex;
            align-items: center;
        }

        .menu {
            list-style: none;
            display: flex;
            gap: 20px;
            font-size: 17px;
        }

        .menu a {
            color: white;
            text-decoration: none;
        }

        .menu a:hover {
            color: #ffcc00;
        }

        .section {
            background-color: white;
            padding: 10px 0;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;

            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: clamp(20px, 3vw, 60px);
        }

        .box1 {
            flex: 1 1 250px;
            max-width: 300px;
            aspect-ratio: 5 / 4;
            background-color: #A4C8F0;
            border-radius: 20px;

            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center; 
            
            text-align: center; 
            padding: 20px 15px 40px 15px; 
            box-sizing: border-box;
        }

        .box2{
            flex: 1 1 250px;
            max-width: 300px;
            aspect-ratio: 5 / 4;
            background-color: #A4C8F0;
            border-radius: 20px;

            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center; 
            
            text-align: center; 
            padding: 20px 15px 40px 15px; 
            box-sizing: border-box;
        }

        .box3{
            flex: 1 1 250px;
            max-width: 300px;
            aspect-ratio: 5 / 4;
            background-color: #A4C8F0;
            border-radius: 20px;

            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center; 
            
            text-align: center; 
            padding: 20px 15px 40px 15px; 
            box-sizing: border-box;
        }

        .box4{
            flex: 1 1 250px;
            max-width: 300px;
            aspect-ratio: 5 / 4;
            background-color: #A4C8F0;
            border-radius: 20px;

            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center; 
            
            text-align: center; 
            padding: 20px 15px 40px 15px; 
            box-sizing: border-box;
        }

        .text{
            align-items: center;
            text-align: center;
        }

        .phone {
            position: relative;
            width: 600px;
            margin: 0 auto;
        }

        #screen {
            width: 100%;
            display: block;
        }

        .button2 {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px;
            background: rgba(0,0,0,0.3);
            color: white;
            border: none;
            cursor: pointer;
        }

        .prev {
            left: 0;
        }

        .next {
            right: 0px;
        }

        #screen {
            transition: opacity 0.3s ease;
        }

        .phone button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px;
            background: rgba(0,0,0,0.3);
            color: white;
            border: none;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="메인 페이지.html" style="text-decoration: none; color: inherit;">
            <div class="left">
                <img src="img/뇌-파랑.png" class="brain-logo">
                <div class="logo">브레인 코드</div>
            </div>
        </a>
    
        <ul class="menu">
            <li><a href="로그인 페이지.html">로그인</a></li>
            <li><a href="회원가입 페이지.html">회원가입</a></li>
        </ul>
    </nav>

    <div class="div1">
    <h1>
        발달장애 아동을 위한<br>
        인지 훈련 게임 플랫폼
    </h1>

    <p class="p1">
        아이의 인지능력과 소통능력을 키워요!<br>
        다양한 게임으로 즐겁게 학습해요!<br>
    </p>
    </div>

    <br>

    <button class="button" onclick="location.href='로그인 페이지.html'">
        지금 무료로 시작하기<span class="arrow">></span>
    </button>

    <br><br><br>

    <div class="section">
        <div class="container">
            <div class="box1">
                <h3>의사소통 어려움</h3>
                <p class="p2">말 이해와 표현 능력 저하</p>
            </div>

            <div class="box2">
                <h3>기초학습 어려움</h3>
                <p class="p2">놀이 학습 집중력 부족</p>
            </div>

            <div class="box3">
                <h3>부모님의 부담</h3>
                <p class="p2">학습 지도 부담</p>
            </div>

            <div class="box4">
                <h3>동기 부족</h3>
                <p class="p2">학습에 흥미를 느끼기 어려움</p>
            </div>
        </div>
    </div>

    <br><br>

    <h3 class="text">발달장애 아동의 학습을 돕기 위해 만들었어요!</h3>

    <br>
    
    <div class="phone">
        <img id="screen" src="img/핸드폰.png" />

        <button class="prev button2" onclick="prevSlide()">←</button>
        <button class="next button2" onclick="nextSlide()">→</button>
    </div>

</body>
</html>
